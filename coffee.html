<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Coffee Website</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
        <link rel="stylesheet" href="coffee.css">
    </head>
    <body>
       <header>
        <nav class="navbar section-content">
            <a href="#" class="nav-logo">
                <h2 class="logo-text">☕ coffee</h2>
            </a>
            <ul class="nav-menu">
                <button id="menu-close-button" class="fas fa-times"></button>
                <li class="item">
                    <a href="#" class="nav-link">Home</a>
                </li>
                <li class="item">
                    <a href="#" class="nav-link">About.html</a>
                </li>
                <li class="item">
                    <a href="#" class="nav-link">Menu</a>
                </li>
                <li class="item">
                    <a href="#" class="nav-link">Testimonials</a>
                </li>
                <li class="item">
                    <a href="#" class="nav-link">Gallery</a>
                </li>
                <li class="item">
                    <a href="#" class="nav-link">Contact</a>
                </li>
            </ul>
            <button id="menu-open-button" class="fas fa-bars"></button>
        </nav>
       </header> 

       <main>
        <section class="hero-section">
            <div class="section-content">
                <div class="hero-details">
                    <h2 class="title">Best coffee</h2>
                    <h3 class="subtitle">Make your day great with our special coffee</h3>
                    <p class="description">Welcome to our coffee paradise, where every bean tells a story and every cup sparks joy.</p>
                    <div class="buttons">
                        <a href="#" class="button order-now">Order Now</a>
                        <a href="#" class="button contact-us">Contact Us</a>
                    </div>
                </div> 
                <div class="hero-image-wrapper">
                    <img src="coffee.png" alt="Cup of coffee" class="hero-image">
                </div>
            </div>
        </section>
       </main>
       
       <script>
        // Mobile menu functionality
        const menuOpenButton = document.getElementById('menu-open-button');
        const menuCloseButton = document.getElementById('menu-close-button');
        const navMenu = document.querySelector('.nav-menu');
        
        menuOpenButton.addEventListener('click', () => {
            navMenu.classList.add('active');
        });
        
        menuCloseButton.addEventListener('click', () => {
            navMenu.classList.remove('active');
        });
        
        // Close menu when clicking on a link
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
            });
        });
       </script>
    </body>
</html>
